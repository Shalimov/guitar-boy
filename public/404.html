<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guitar Boy</title>
    <script>
      const basePath = "/guitar-boy";
      const routePath = window.location.pathname.startsWith(basePath)
        ? window.location.pathname.slice(basePath.length)
        : window.location.pathname;
      const redirectParams = new URLSearchParams();

      redirectParams.set("p", routePath.replace(/^\/+/, ""));

      if (window.location.search.length > 1) {
        redirectParams.set("q", window.location.search.slice(1));
      }

      if (window.location.hash.length > 1) {
        redirectParams.set("h", window.location.hash.slice(1));
      }

      window.location.replace(`${window.location.origin}${basePath}/?${redirectParams.toString()}`);
    </script>
  </head>
  <body></body>
</html>
